listener 1883
listener 9001
protocol websockets

# Allow anonymous for development — add password_file for production:
# password_file /mosquitto/config/passwd
# allow_anonymous false
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
