# ChirpStack Gateway Bridge v4 configuration
# Receives Semtech UDP from physical gateways and republishes to MQTT

[general]
  log_level = 4   # debug=5 info=4 warning=3 error=2 critical=1

[backend]
  type = "semtech_udp"

  [backend.semtech_udp]
    udp_bind = "0.0.0.0:1700"

[integration]
  marshaler = "protobuf"

  [integration.mqtt]
    event_topic_template   = "eu868/gateway/{{ .GatewayID }}/event/{{ .EventType }}"
    command_topic_template = "eu868/gateway/{{ .GatewayID }}/command/#"

    [integration.mqtt.auth]
      type = "generic"

      [integration.mqtt.auth.generic]
        server   = "tcp://mosquitto:1883"
        username = ""
        password = ""
